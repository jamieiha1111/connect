<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Connect with Jamie</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0E0C0A; --bronze: #C4971F; --bronze-dim: #8B6914;
    --bronze-glow: rgba(196,151,31,0.15); --cream: #F0E8D8;
    --muted: #6B5E4E; --rule: rgba(196,151,31,0.2);
  }
  html, body { height: 100%; background: var(--bg); color: var(--cream); font-family: 'DM Mono', monospace; overflow: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% -10%, rgba(196,151,31,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 80% 110%, rgba(139,105,20,0.08) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .wrap { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 32px; }
  .rule-top { width: 1px; height: 60px; background: linear-gradient(to bottom, transparent, var(--bronze-dim)); margin-bottom: 32px; animation: fadeIn 1s ease both; }
  .eyebrow { font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--bronze); margin-bottom: 20px; animation: fadeIn 0.8s ease 0.1s both; }
  .name { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(48px, 12vw, 72px); line-height: 1; letter-spacing: -0.01em; color: var(--cream); text-align: center; animation: fadeUp 0.9s ease 0.2s both; }
  .name em { font-style: italic; color: var(--bronze); }
  .title { margin-top: 14px; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); text-align: center; line-height: 1.9; animation: fadeIn 0.8s ease 0.4s both; }
  .divider { width: 40px; height: 1px; background: var(--rule); margin: 28px auto; animation: fadeIn 0.8s ease 0.5s both; }
  .prompt { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; font-size: 18px; color: rgba(240,232,216,0.6); text-align: center; margin-bottom: 24px; animation: fadeIn 0.8s ease 0.6s both; }
  .input-row { width: 100%; max-width: 360px; position: relative; animation: fadeUp 0.9s ease 0.7s both; }
  input[type="email"] { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--rule); border-radius: 4px; padding: 16px 56px 16px 20px; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 300; color: var(--cream); letter-spacing: 0.04em; outline: none; transition: border-color 0.25s, background 0.25s, box-shadow 0.25s; -webkit-appearance: none; }
  input[type="email"]::placeholder { color: var(--muted); letter-spacing: 0.08em; }
  input[type="email"]:focus { border-color: var(--bronze-dim); background: rgba(196,151,31,0.05); box-shadow: 0 0 0 3px var(--bronze-glow); }
  .send-btn { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); width: 38px; height: 38px; background: var(--bronze); border: none; border-radius: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.15s; }
  .send-btn:hover { background: #D4A830; }
  .send-btn:active { transform: translateY(-50%) scale(0.93); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; fill: #0E0C0A; }
  .status { margin-top: 16px; font-size: 10px; letter-spacing: 0.15em; text-align: center; min-height: 16px; }
  .status.success { color: var(--bronze); }
  .status.error { color: #E07070; }
  .success-screen { display: none; flex-direction: column; align-items: center; gap: 16px; animation: fadeUp 0.6s ease both; }
  .success-screen.visible { display: flex; }
  .check-ring { width: 64px; height: 64px; border-radius: 50%; border: 1px solid var(--bronze-dim); display: flex; align-items: center; justify-content: center; }
  .check-ring svg { width: 28px; height: 28px; stroke: var(--bronze); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .success-title { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 28px; color: var(--cream); }
  .success-sub { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); text-align: center; line-height: 1.8; }
  .again-btn { margin-top: 8px; background: none; border: 1px solid var(--rule); border-radius: 3px; padding: 10px 24px; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); cursor: pointer; transition: border-color 0.2s, color 0.2s; }
  .again-btn:hover { border-color: var(--bronze-dim); color: var(--bronze); }
  .rule-bottom { width: 1px; height: 60px; background: linear-gradient(to bottom, var(--bronze-dim), transparent); margin-top: 32px; animation: fadeIn 1s ease 0.8s both; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(14,12,10,0.3); border-top-color: #0E0C0A; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div id="main-view" style="display:flex;flex-direction:column;align-items:center;width:100%;">
    <div class="rule-top"></div>
    <div class="eyebrow">Prospac Holdings Group</div>
    <div class="name">Jamie <em>Iha</em></div>
    <div class="title">Assistant Director, Revenue &amp; Marketing Strategy<br>Property Manager</div>
    <div class="divider"></div>
    <div class="prompt">Drop your email — I'll be in touch.</div>
    <div class="input-row">
      <input type="email" id="email-input" placeholder="your@email.com" autocomplete="email" />
      <button class="send-btn" id="send-btn" onclick="sendEmail()">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
    <div class="status" id="status"></div>
    <div class="rule-bottom"></div>
  </div>
  <div id="success-view" class="success-screen">
    <div class="check-ring"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
    <div class="success-title">Email sent!</div>
    <div class="success-sub">Check your inbox for a note from Jamie.<br>Looking forward to connecting.</div>
    <button class="again-btn" onclick="reset()">Send to another</button>
  </div>
</div>
<script>
  emailjs.init({ publicKey: "IFWfxy2Xm5RbJ9ypt", privateKey: "iT8H-UEbdynwmt6dMk8ez" });

  function sendEmail() {
    var input = document.getElementById("email-input");
    var btn = document.getElementById("send-btn");
    var status = document.getElementById("status");
    var email = input.value.trim();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      status.textContent = "Please enter a valid email address.";
      status.className = "status error";
      return;
    }
    btn.innerHTML = '<div class="spinner"></div>';
    btn.disabled = true;
    status.textContent = "";
    emailjs.send("service_saz3bhm", "4sgsa99", { to_email: email })
      .then(function() {
        document.getElementById("main-view").style.display = "none";
        document.getElementById("success-view").classList.add("visible");
      })
      .catch(function(err) {
        console.error(err);
        status.textContent = "Something went wrong. Please try again.";
        status.className = "status error";
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="#0E0C0A"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>';
        btn.disabled = false;
      });
  }

  function reset() {
    document.getElementById("email-input").value = "";
    document.getElementById("status").textContent = "";
    document.getElementById("send-btn").innerHTML = '<svg viewBox="0 0 24 24" fill="#0E0C0A"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>';
    document.getElementById("send-btn").disabled = false;
    document.getElementById("success-view").classList.remove("visible");
    document.getElementById("main-view").style.display = "flex";
  }

  document.getElementById("email-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") sendEmail();
  });
</script>
</body>
</html>
